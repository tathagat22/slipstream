<svg width="520" height="132" viewBox="0 0 520 132" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Slipstream">
  <defs>
    <linearGradient id="stream" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.55" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <!-- mark: slipstream draft lines tapering into a wake -->
  <g transform="translate(20,18)">
    <rect x="0" y="0" width="96" height="96" rx="22" fill="#0b1220"/>
    <g stroke="url(#stream)" stroke-linecap="round" fill="none">
      <path d="M20 34 H78" stroke-width="7" opacity="0.95"/>
      <path d="M14 50 H72" stroke-width="7" opacity="0.75"/>
      <path d="M24 66 H82" stroke-width="7" opacity="0.55"/>
    </g>
    <circle cx="78" cy="34" r="4.5" fill="#38bdf8"/>
  </g>

  <!-- wordmark (dark text, for light backgrounds) -->
  <g transform="translate(140,0)">
    <text x="0" y="62" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
          font-size="44" font-weight="700" fill="#0b1220">Slipstream</text>
    <text x="2" y="92" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
          font-size="17" font-weight="500" fill="#475569" letter-spacing="0.3">A shared distillation cache for AI agents</text>
  </g>
</svg>
